<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Portal — Stonewell Capital Partners</title>
  <meta name="description" content="Stonewell Capital Partners — secure client portal (beta)." />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0C2942" />
  <link rel="icon" type="image/svg+xml" href="assets/stonewell-shield.svg" />
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body class="auth-body">

  <header class="auth-header">
    <div class="container auth-header-inner">
      <a href="index.html" class="brand" aria-label="Stonewell Capital Partners — home">
        <span class="brand-mark" aria-hidden="true">
          <img src="assets/stonewell-shield.svg" alt="" width="34" height="42" />
        </span>
        <span class="brand-text">
          <span class="brand-name">STONEWELL</span>
          <span class="brand-sub">CAPITAL PARTNERS</span>
        </span>
      </a>

      <div class="auth-header-actions">
        <div class="lang-toggle" role="group" aria-label="Language">
          <button type="button" data-lang="en" class="active">EN</button>
          <span class="lang-sep">|</span>
          <button type="button" data-lang="es">ES</button>
        </div>
        <button type="button" id="logout-btn" class="portal-logout"
                data-en="Sign Out" data-es="Cerrar Sesión">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-bg" aria-hidden="true"></div>

    <section class="auth-card portal-card" aria-labelledby="portal-title">
      <span class="brand-mark large" aria-hidden="true">
        <img src="assets/stonewell-shield.svg" alt="Stonewell Capital Partners" width="56" height="68" />
      </span>

      <span class="portal-eyebrow" data-en="Beta Preview" data-es="Vista Beta">Beta Preview</span>
      <h1 id="portal-title" class="auth-title"
          data-en="Welcome" data-es="Bienvenido">Welcome</h1>
      <span class="title-rule auth-rule" aria-hidden="true"></span>

      <p class="auth-intro" id="portal-greeting"
         data-en="You are signed in to the Stonewell client portal."
         data-es="Ha iniciado sesión en el portal de clientes de Stonewell.">
        You are signed in to the Stonewell client portal.</p>

      <p class="portal-account">
        <span data-en="Signed in as" data-es="Sesión iniciada como">Signed in as</span>
        <strong id="portal-email">—</strong>
      </p>

      <p class="auth-foot"
         data-en="This portal is in beta. Additional client features will be enabled here."
         data-es="Este portal está en beta. Aquí se habilitarán funciones adicionales para clientes.">
        This portal is in beta. Additional client features will be enabled here.</p>

      <a href="index.html" class="back-link"
         data-en="← Return to site" data-es="← Volver al sitio">← Return to site</a>
    </section>
  </main>

  <script src="assets/vendor/amazon-cognito-identity.min.js"></script>
  <script src="assets/auth-config.js"></script>
  <script src="portal.js"></script>
</body>
</html>
