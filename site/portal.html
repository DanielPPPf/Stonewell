<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Portal — Stonewell Capital Partners</title>
  <meta name="description" content="Stonewell Capital Partners — secure client portal (beta)." />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0C2942" />
  <link rel="icon" type="image/svg+xml" href="assets/stonewell-shield.svg" />
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body class="auth-body">

  <header class="auth-header">
    <div class="container auth-header-inner">
      <a href="index.html" class="brand" aria-label="Stonewell Capital Partners — home">
        <span class="brand-mark" aria-hidden="true">
          <img src="assets/stonewell-shield.svg" alt="" width="34" height="42" />
        </span>
        <span class="brand-text">
          <span class="brand-name">STONEWELL</span>
          <span class="brand-sub">CAPITAL PARTNERS</span>
        </span>
      </a>

      <div class="auth-header-actions">
        <div class="lang-toggle" role="group" aria-label="Language / Idioma / Langue">
          <button type="button" data-lang="en" class="active" aria-label="English">
            <img src="assets/flags/us.svg" alt="" class="lang-flag" width="20" height="14" /><span class="lang-code">EN</span>
          </button>
          <button type="button" data-lang="es" aria-label="Español">
            <img src="assets/flags/es.svg" alt="" class="lang-flag" width="20" height="14" /><span class="lang-code">ES</span>
          </button>
          <button type="button" data-lang="fr" aria-label="Français">
            <img src="assets/flags/fr.svg" alt="" class="lang-flag" width="20" height="14" /><span class="lang-code">FR</span>
          </button>
        </div>
        <button type="button" id="logout-btn" class="portal-logout"
                data-en="Sign Out" data-es="Cerrar Sesión" data-fr="Se déconnecter">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-bg" aria-hidden="true"></div>

    <section class="auth-card portal-card" aria-labelledby="portal-title">
      <span class="brand-mark large" aria-hidden="true">
        <img src="assets/stonewell-shield.svg" alt="Stonewell Capital Partners" width="56" height="68" />
      </span>

      <span class="portal-eyebrow" data-en="Beta Preview" data-es="Vista Beta" data-fr="Aperçu Bêta">Beta Preview</span>
      <h1 id="portal-title" class="auth-title"
          data-en="Welcome" data-es="Bienvenido" data-fr="Bienvenue">Welcome</h1>
      <span class="title-rule auth-rule" aria-hidden="true"></span>

      <p class="auth-intro" id="portal-greeting"
         data-en="You are signed in to the Stonewell client portal."
         data-es="Ha iniciado sesión en el portal de clientes de Stonewell."
         data-fr="Vous êtes connecté à l'espace client de Stonewell.">
        You are signed in to the Stonewell client portal.</p>

      <p class="portal-account">
        <span data-en="Signed in as" data-es="Sesión iniciada como" data-fr="Connecté en tant que">Signed in as</span>
        <strong id="portal-email">—</strong>
      </p>

      <p class="auth-foot"
         data-en="This portal is in beta. Additional client features will be enabled here."
         data-es="Este portal está en beta. Aquí se habilitarán funciones adicionales para clientes."
         data-fr="Cet espace est en version bêta. D'autres fonctionnalités client y seront activées.">
        This portal is in beta. Additional client features will be enabled here.</p>

      <a href="index.html" class="back-link"
         data-en="← Return to site" data-es="← Volver al sitio" data-fr="← Retour au site">← Return to site</a>
    </section>
  </main>

  <script src="assets/vendor/amazon-cognito-identity.min.js"></script>
  <script src="assets/auth-config.js"></script>
  <script src="portal.js"></script>
</body>
</html>
