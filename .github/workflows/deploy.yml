name: Deploy site

# Deploys site/ to S3 + invalidates CloudFront on every push to main that
# touches the site. Auth is via GitHub OIDC assuming a least-privilege IAM
# role — no long-lived AWS keys stored in the repo.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write   # required to request the OIDC token
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ROLE_ARN: arn:aws:iam::326804803049:role/stonewell-beta-gha-deploy
  SITE_BUCKET: stonewell-beta-site-326804803049
  DIST_ID: E2I1YCYTQL2V4

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy site to S3
        run: |
          # Re-upload every file with `Cache-Control: no-cache` so visitors'
          # browsers always revalidate and pick up changes WITHOUT manually
          # clearing their cache. `no-cache` = "may store, but revalidate first"
          # → unchanged files return a tiny 304; changed files download fresh.
          # (Tiny static site, so the extra revalidation round-trips are
          # negligible; CloudFront still serves from the edge.) `cp` re-uploads
          # all objects so the header lands on every file, not just changed ones.
          aws s3 cp site/ "s3://${SITE_BUCKET}" --recursive \
            --cache-control "no-cache" \
            --exclude ".DS_Store" --exclude "*/.DS_Store" --exclude "AUTH.md"

          # Prune files that were removed from the repo (cp cannot delete).
          aws s3 sync site/ "s3://${SITE_BUCKET}" --delete --size-only \
            --cache-control "no-cache" \
            --exclude ".DS_Store" --exclude "*/.DS_Store" --exclude "AUTH.md"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DIST_ID}" --paths "/*" \
            --query 'Invalidation.Id' --output text
